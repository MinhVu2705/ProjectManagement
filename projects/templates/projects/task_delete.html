<!-- projects/templates/projects/task_delete.html -->

<h1>Xác Nhận Xóa Công Việc</h1>
<p>Bạn có chắc chắn muốn xóa công việc "{{ task.title }}" thuộc dự án "{{ project.name }}" không?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Xóa Công Việc</button>
    <a href="{% url 'project_detail' project_id=project.id %}" class="btn btn-secondary">Hủy</a>
</form>
